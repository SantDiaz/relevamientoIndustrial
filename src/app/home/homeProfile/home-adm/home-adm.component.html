<div *ngIf="users.length > 0; else noUsers">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Roles</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.roles.join(', ') }}</td>
      </tr>
    </tbody>
  </table>
</div>

<ng-template #noUsers>
  <p>No hay usuarios disponibles.</p>
</ng-template>
